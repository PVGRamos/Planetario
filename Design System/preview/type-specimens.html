<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"><style>
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-VariableFont_wght.ttf') format('truetype-variations'); font-weight: 200 800; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Light.ttf') format('truetype'); font-weight: 300; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-ExtraBold.ttf') format('truetype'); font-weight: 800; font-style: normal; font-display: swap; }
</style>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Manrope', sans-serif; background: #F4F6F8; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.card { background: #fff; border-radius: 8px; padding: 16px; border: 1px solid #E8EDF2; }
.overline { font-size: 11px; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.title { font-size: 20px; font-weight: 700; color: #0F1C2E; line-height: 1.2; }
.sub { font-size: 14px; color: #64748B; margin-top: 2px; }
.divider { height: 1px; background: #E8EDF2; margin: 12px 0; }
.body-text { font-size: 14px; color: #334155; line-height: 1.6; }
.label-row { display: flex; gap: 24px; margin-top: 8px; }
.lbl { font-size: 12px; font-weight: 500; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.06em; }
.val { font-size: 13px; font-weight: 600; color: #0F1C2E; margin-top: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="overline">Rastreamento ativo</div>
  <div class="title">Carga #PC-2026-08421</div>
  <div class="sub">São Paulo → Belo Horizonte</div>
  <div class="divider"></div>
  <div class="body-text">Atraso identificado — nova previsão: 14:30</div>
  <div class="label-row">
    <div><div class="lbl">Origem</div><div class="val">São Paulo, SP</div></div>
    <div><div class="lbl">Destino</div><div class="val">Belo Horizonte, MG</div></div>
    <div><div class="lbl">Previsão</div><div class="val">14:30 hoje</div></div>
  </div>
</div>
</body>
</html>
