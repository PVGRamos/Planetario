<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"><style>
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-VariableFont_wght.ttf') format('truetype-variations'); font-weight: 200 800; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Light.ttf') format('truetype'); font-weight: 300; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-ExtraBold.ttf') format('truetype'); font-weight: 800; font-style: normal; font-display: swap; }
</style>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Manrope', sans-serif; background: #fff; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
.section { display: flex; flex-direction: column; gap: 8px; }
.label { font-size: 11px; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.space-row { display: flex; align-items: center; gap: 12px; }
.bar { height: 20px; background: #1A5FB4; border-radius: 3px; opacity: 0.8; }
.sp-label { font-size: 12px; font-family: 'IBM Plex Mono', monospace; color: #334155; white-space: nowrap; }
.radius-row { display: flex; gap: 12px; align-items: flex-end; }
.r-box { background: #1A5FB4; opacity: 0.15; border: 2px solid #1A5FB4; width: 48px; height: 48px; }
.r-label { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: #64748B; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<div class="section">
  <div class="label">Spacing Scale (8px base)</div>
  <div class="space-row"><div class="bar" style="width:4px"></div><div class="sp-label">4px — space-1</div></div>
  <div class="space-row"><div class="bar" style="width:8px"></div><div class="sp-label">8px — space-2</div></div>
  <div class="space-row"><div class="bar" style="width:12px"></div><div class="sp-label">12px — space-3</div></div>
  <div class="space-row"><div class="bar" style="width:16px"></div><div class="sp-label">16px — space-4</div></div>
  <div class="space-row"><div class="bar" style="width:24px"></div><div class="sp-label">24px — space-6</div></div>
  <div class="space-row"><div class="bar" style="width:32px"></div><div class="sp-label">32px — space-8</div></div>
  <div class="space-row"><div class="bar" style="width:48px"></div><div class="sp-label">48px — space-12</div></div>
  <div class="space-row"><div class="bar" style="width:64px"></div><div class="sp-label">64px — space-16</div></div>
</div>
<div class="section">
  <div class="label">Border Radius</div>
  <div class="radius-row">
    <div><div class="r-box" style="border-radius:4px"></div><div class="r-label">4px<br>sm</div></div>
    <div><div class="r-box" style="border-radius:6px"></div><div class="r-label">6px<br>md</div></div>
    <div><div class="r-box" style="border-radius:8px"></div><div class="r-label">8px<br>lg</div></div>
    <div><div class="r-box" style="border-radius:12px"></div><div class="r-label">12px<br>xl</div></div>
    <div><div class="r-box" style="border-radius:9999px; width:64px;height:32px"></div><div class="r-label">9999px<br>full</div></div>
  </div>
</div>
</body>
</html>
