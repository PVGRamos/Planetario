<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"><style>
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-VariableFont_wght.ttf') format('truetype-variations'); font-weight: 200 800; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Light.ttf') format('truetype'); font-weight: 300; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
@font-face { font-family: 'Manrope'; src: url('../fonts/Manrope-ExtraBold.ttf') format('truetype'); font-weight: 800; font-style: normal; font-display: swap; }
</style>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Manrope', sans-serif; background: #F4F6F8; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.label { font-size: 11px; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600;
  border-radius: 4px; padding: 3px 9px;
  white-space: nowrap;
}
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.badge-success { background: #DCFCE7; color: #15803D; }
.badge-warning { background: #FEF3C7; color: #B45309; }
.badge-error   { background: #FDE8E8; color: #9B3535; }
.badge-info    { background: #DBEAFE; color: #1D4ED8; }
.badge-neutral { background: #E8EDF2; color: #334155; }
</style>
</head>
<body>
<div>
  <div class="label">Status de Carga</div>
  <div class="row">
    <span class="badge badge-success"><span class="dot" style="background:#16A34A"></span>Finalizado</span>
    <span class="badge badge-info"><span class="dot" style="background:#1A5FB4"></span>Em transporte</span>
    <span class="badge badge-info"><span class="dot" style="background:#2D9CDB"></span>Em coleta</span>
    <span class="badge badge-info"><span class="dot" style="background:#2574D4"></span>Em entrega</span>
    <span class="badge badge-warning"><span class="dot" style="background:#D97706"></span>Atenção</span>
    <span class="badge badge-error"><span class="dot" style="background:#C94B4B"></span>Atrasado</span>
    <span class="badge badge-neutral"><span class="dot" style="background:#94A3B8"></span>Pendente</span>
  </div>
</div>
<div>
  <div class="label">Sistema</div>
  <div class="row">
    <span class="badge badge-success">Concluído</span>
    <span class="badge badge-error">Erro</span>
    <span class="badge badge-warning">Processando</span>
    <span class="badge badge-neutral">Rascunho</span>
  </div>
</div>
</body>
</html>
