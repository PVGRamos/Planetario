version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: planetario_db
    environment:
      POSTGRES_USER: planetario
      POSTGRES_PASSWORD: planetario123
      POSTGRES_DB: planetario_financeiro
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
